<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="headerTitle">Matheus' Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="index.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <header class="site-header">
            <div class="header-left">
                <p class="header-title" data-i18n="headerTitle">Matheus' Portfolio</p>
            </div>
            <div class="header-right">
                <!-- Contact link -->
                <a href="contact.html" class="header-link" data-i18n="contact">Contact</a>
        
                <!-- Instagram icon -->
                <a href="https://instagram.com/mborgest" target="_blank" rel="noopener" class="header-icon">
                    <img src="assets/instagram-icon.svg" alt="Instagram">
                </a>
        
                <!-- Language switch button -->
                <button class="header-lang-btn">EN</button>
            </div>
        </header>
        <main>
            <section>
                <p class="section-title" data-i18n="sectionInfrared">Infrared</p>
                <div id="infrared-mosaic-container" class="mosaic-container">
                    <!-- Photos will be dynamically loaded here -->
                </div>
            </section>

            <section>
                <p class="section-title" data-i18n="sectionPeople">People</p>
                <div id="people-mosaic-container" class="mosaic-container">
                    <!-- Photos will be dynamically loaded here -->
                </div>
            </section>

            <section>
                <p class="section-title" data-i18n="sectionPortraits">Portraits</p>
                <div id="portraits-mosaic-container" class="mosaic-container">
                    <!-- Photos will be dynamically loaded here -->
                </div>
            </section>

            <section>
                <p class="section-title" data-i18n="sectionLandscapes">Landscapes/Other</p>
                <div id="landscapes-other-mosaic-container" class="mosaic-container">
                    <!-- Photos will be dynamically loaded here -->
                </div>
            </section>
        </main>
        <footer>
            <p data-i18n="copyright">© 2026 Matheus Borges. All rights reserved.</p>
        </footer>
    </div>

    <div id="lightbox" class="lightbox hidden">
        <div class="lightbox-backdrop"></div>

        <button
            id="lightbox-close"
            class="lightbox-close"
            aria-label="Close slideshow"
        >
            ×
        </button>
    
        <button class="lightbox-btn left" aria-label="Previous image">❮</button>
        <img id="lightbox-image" />
        <button class="lightbox-btn right" aria-label="Next image">❯</button>
    </div>
</body>
</html>
